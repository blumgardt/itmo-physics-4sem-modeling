<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Магнитное поле соленоида</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #plot {
    width: 100%;
    height: calc(100vh - 150px);
    min-height: 720px;
    flex: 1 1 auto;
  }

  .controls {
    display: flex; flex-wrap: wrap; justify-content: center; align-items: end;
    gap: 24px; padding: 18px 24px; background: #181b25;
    border-top: 1px solid #2a2e3a;
  }

  .slider-group {
    display: flex; flex-direction: column; align-items: center; min-width: 160px;
  }
  .slider-group label {
    font-size: 13px; color: #9aa0b0; margin-bottom: 6px; letter-spacing: 0.5px;
  }
  .slider-group input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 160px; height: 6px; cursor: pointer;
    background: #2a2e3a; border-radius: 3px; outline: none;
  }
  .slider-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #5b9cf5; border: 2px solid #3b7ddd; cursor: pointer;
  }
  .slider-group input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: #5b9cf5; border: 2px solid #3b7ddd; cursor: pointer;
  }
  .slider-group .value {
    font-size: 15px; color: #5b9cf5; margin-top: 6px;
    font-weight: 600; font-variant-numeric: tabular-nums;
  }

  #resetBtn {
    align-self: center; padding: 8px 22px; cursor: pointer;
    background: #252a38; color: #9aa0b0; border: 1px solid #3a3f52;
    border-radius: 6px; font-size: 13px; transition: all 0.15s;
  }
  #resetBtn:hover { background: #3a3f52; color: #e0e0e0; }

  .info-bar {
    display: flex; justify-content: center; gap: 32px;
    padding: 10px 24px; background: #141720;
    border-top: 1px solid #2a2e3a; font-size: 13px;
    flex: 0 0 auto;
  }
  .info-bar .info-item { color: #6b7280; }
  .info-bar .info-value { color: #7ec8e3; font-weight: 600; margin-left: 4px; }
  .info-bar .info-value.accent { color: #f0a050; }

  #status {
    text-align: center; padding: 4px; font-size: 12px; color: #555;
    min-height: 20px;
    flex: 0 0 auto;
  }
  #status.loading { color: #5b9cf5; }
  #status.error { color: #e05555; }
</style>
</head>
<body>

<div id="plot"></div>

<div class="info-bar">
  <div class="info-item">B(центр) = <span class="info-value" id="infoCenter">—</span></div>
  <div class="info-item">B<sub>теор</sub>(бесконечный) = <span class="info-value accent" id="infoTheory">—</span></div>
</div>

<div class="controls">
  <div class="slider-group">
    <label>Диаметр D</label>
    <input type="range" id="slD" min="2" max="30" step="0.5" value="10">
    <div class="value" id="valD">10.0 см</div>
  </div>
  <div class="slider-group">
    <label>Длина L</label>
    <input type="range" id="slL" min="5" max="100" step="1" value="30">
    <div class="value" id="valL">30 см</div>
  </div>
  <div class="slider-group">
    <label>Витки N</label>
    <input type="range" id="slN" min="5" max="500" step="5" value="100">
    <div class="value" id="valN">100</div>
  </div>
  <div class="slider-group">
    <label>Ток I</label>
    <input type="range" id="slI" min="0.1" max="10" step="0.1" value="1.0">
    <div class="value" id="valI">1.0 А</div>
  </div>
  <div class="slider-group">
    <label>Масштаб</label>
    <input type="range" id="slScale" min="1.5" max="6" step="0.5" value="1.5">
    <div class="value" id="valScale">1.5x</div>
  </div>
  <button id="resetBtn">Сброс</button>
</div>
<div id="status"></div>

<script>
const defaults = { d: 10, l: 30, n: 100, i: 1.0, scale: 1.5 };
const slD = document.getElementById('slD');
const slL = document.getElementById('slL');
const slN = document.getElementById('slN');
const slI = document.getElementById('slI');
const slScale = document.getElementById('slScale');
const valD = document.getElementById('valD');
const valL = document.getElementById('valL');
const valN = document.getElementById('valN');
const valI = document.getElementById('valI');
const valScale = document.getElementById('valScale');
const statusEl = document.getElementById('status');
const infoCenter = document.getElementById('infoCenter');
const infoTheory = document.getElementById('infoTheory');

let debounceTimer = null;
let fetchController = null;

function getParams() {
  return {
    d: parseFloat(slD.value) / 100,
    l: parseFloat(slL.value) / 100,
    n: parseInt(slN.value),
    i: parseFloat(slI.value),
    scale: parseFloat(slScale.value),
  };
}

function updateLabels() {
  valD.textContent = parseFloat(slD.value).toFixed(1) + ' см';
  valL.textContent = slL.value + ' см';
  valN.textContent = slN.value;
  valI.textContent = parseFloat(slI.value).toFixed(1) + ' А';
  valScale.textContent = parseFloat(slScale.value).toFixed(1) + 'x';
}

async function fetchAndPlot() {
  const params = getParams();
  statusEl.textContent = 'Вычисление...';
  statusEl.className = 'loading';

  // Cancel previous in-flight request
  if (fetchController) fetchController.abort();
  fetchController = new AbortController();

  try {
    const resp = await fetch('/api/compute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params),
      signal: fetchController.signal,
    });
    if (!resp.ok) {
      const message = await resp.text();
      throw new Error(message || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    render(data, params);
    statusEl.textContent = '';
    statusEl.className = '';
  } catch (e) {
    if (e.name === 'AbortError') return;
    statusEl.textContent = 'Ошибка: ' + e.message;
    statusEl.className = 'error';
  }
}

function formatField(val) {
  const uT = val * 1e6;
  if (uT >= 1000) return (uT / 1000).toFixed(2) + ' мТл';
  if (uT >= 1) return uT.toFixed(1) + ' мкТл';
  return (uT * 1000).toFixed(1) + ' нТл';
}

function render(data, params) {
  const traces = [];

  // heatmap
  const zMax = 1.5 * data.b_theory;
  traces.push({
    type: 'heatmap',
    z: data.b_mag,
    x: data.z_axis,
    y: data.y_axis,
    colorscale: [
      [0,    '#0d0221'],
      [0.05, '#1a0a4e'],
      [0.15, '#3b1f8e'],
      [0.3,  '#6b3fa0'],
      [0.45, '#a05195'],
      [0.6,  '#d45087'],
      [0.75, '#f95d6a'],
      [0.88, '#ff9e3b'],
      [1,    '#ffec6e'],
    ],
    zmin: 0,
    zmax: zMax > 0 ? zMax : 1e-10,
    colorbar: {
      title: { text: '|B|, Тл', side: 'right', font: { color: '#ccc', size: 12 } },
      tickfont: { color: '#aaa', size: 11 },
      outlinewidth: 0,
      thickness: 14,
    },
    hovertemplate: 'z: %{x:.1f} см<br>y: %{y:.1f} см<br>|B|: %{z:.3e} Тл<extra></extra>',
  });

  // streamlines
  if (data.streamlines) {
    for (const line of data.streamlines) {
      traces.push({
        type: 'scatter',
        mode: 'lines',
        x: line.map(p => p.x),
        y: line.map(p => p.y),
        line: { color: 'rgba(255,255,255,0.65)', width: 1.3 },
        hoverinfo: 'skip',
        showlegend: false,
      });
    }
  }

  const D_cm = params.d * 100;
  const L_cm = params.l * 100;

  // Update info bar
  infoCenter.textContent = formatField(data.b_center);
  infoTheory.textContent = formatField(data.b_theory);

  const layout = {
    title: {
      text: `Магнитное поле соленоида — D = ${D_cm.toFixed(1)} см, L = ${L_cm.toFixed(0)} см, N = ${params.n}, I = ${params.i.toFixed(1)} А`,
      font: { size: 15, color: '#d0d0d0' },
    },
    xaxis: {
      title: { text: 'z, см', font: { color: '#aaa', size: 13 } },
      range: [data.z_axis[0], data.z_axis[data.z_axis.length - 1]],
      color: '#888', gridcolor: '#252a38', zerolinecolor: '#3a3f52',
      tickfont: { size: 11 },
      constrain: 'domain',
    },
    yaxis: {
      title: { text: 'y, см', font: { color: '#aaa', size: 13 } },
      range: [data.y_axis[0], data.y_axis[data.y_axis.length - 1]],
      color: '#888', gridcolor: '#252a38', zerolinecolor: '#3a3f52',
      tickfont: { size: 11 },
    },
    paper_bgcolor: '#0f1117',
    plot_bgcolor: '#0f1117',
    margin: { t: 60, b: 50, l: 60, r: 30 },
    shapes: [
      // solenoid top wall
      { type: 'line', x0: -data.sol_half_l, x1: data.sol_half_l, y0: data.sol_r, y1: data.sol_r,
        line: { color: '#00e5ff', width: 2.5, dash: 'dot' } },
      // solenoid bottom wall
      { type: 'line', x0: -data.sol_half_l, x1: data.sol_half_l, y0: -data.sol_r, y1: -data.sol_r,
        line: { color: '#00e5ff', width: 2.5, dash: 'dot' } },
      // left end cap
      { type: 'line', x0: -data.sol_half_l, x1: -data.sol_half_l, y0: -data.sol_r, y1: data.sol_r,
        line: { color: '#00e5ff', width: 2, dash: 'dot' } },
      // right end cap
      { type: 'line', x0: data.sol_half_l, x1: data.sol_half_l, y0: -data.sol_r, y1: data.sol_r,
        line: { color: '#00e5ff', width: 2, dash: 'dot' } },
    ],
  };

  Plotly.react('plot', traces, layout, { responsive: true });
}

function onSliderChange() {
  updateLabels();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fetchAndPlot, 120);
}

slD.addEventListener('input', onSliderChange);
slL.addEventListener('input', onSliderChange);
slN.addEventListener('input', onSliderChange);
slI.addEventListener('input', onSliderChange);
slScale.addEventListener('input', onSliderChange);

document.getElementById('resetBtn').addEventListener('click', () => {
  slD.value = defaults.d;
  slL.value = defaults.l;
  slN.value = defaults.n;
  slI.value = defaults.i;
  slScale.value = defaults.scale;
  updateLabels();
  fetchAndPlot();
});

// initial load
updateLabels();
fetchAndPlot();
</script>
</body>
</html>
